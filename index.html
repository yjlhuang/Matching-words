<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文義選填偵探 — 學測攻略</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

/* ── TOKENS ──────────────────────────────────────────── */
:root {
  --bg:       #0c0b09;
  --bg2:      #131210;
  --surface:  #1c1a16;
  --card:     #242018;
  --border:   #38321e;
  --border2:  #2a2518;

  --gold:     #c8a24a;
  --gold-dim: #7a6128;
  --gold-bg:  #1e1a0c;

  --text:     #e6d9b8;
  --text-dim: #8a7d5e;
  --text-xs:  #5a5040;

  --green:    #5ab876;
  --green-bg: #0e1e12;
  --green-b:  #1e4028;

  --red:      #d45050;
  --red-bg:   #1e0e0e;
  --red-b:    #4a1a1a;

  --blue:     #5588cc;
  --blue-bg:  #0e1622;
  --blue-b:   #1a2e4a;

  --amber:    #d4883a;
  --amber-bg: #1e1208;

  /* stage colours */
  --s1: #5ab876; /* grammar - green */
  --s2: #c8a24a; /* colloc  - gold */
  --s3: #5588cc; /* logic   - blue */
  --s4: #b066cc; /* battle  - purple */
}

/* ── RESET ───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 80px;
}

/* ── SCREENS ─────────────────────────────────────────── */
.screen{width:100%;max-width:760px;padding:0 14px;display:none;flex-direction:column;align-items:center;}
.screen.on{display:flex;}

/* ── SITE HEADER ─────────────────────────────────────── */
.site-hd{text-align:center;padding:26px 0 18px;width:100%;}
.site-hd .eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:8px;}
.site-hd h1{font-family:'Noto Serif TC',serif;font-size:clamp(19px,4.5vw,28px);font-weight:700;color:var(--text);letter-spacing:2px;margin-bottom:4px;}
.site-hd .sub{font-size:11px;color:var(--text-dim);letter-spacing:1px;}

/* ── CARD ────────────────────────────────────────────── */
.card{
  width:100%;background:var(--card);
  border:1px solid var(--border);border-radius:10px;
  padding:22px 20px;margin-bottom:12px;
  position:relative;overflow:hidden;
}
.card-top-line{
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--gold-dim) 40%,var(--gold) 50%,var(--gold-dim) 60%,transparent 100%);
  opacity:.6;
}

/* ── HOME: STAGE SECTIONS ────────────────────────────── */
.stage-section{width:100%;margin-bottom:20px;}
.stage-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;padding:0 2px;
}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stage-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
.stage-progress{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-xs);margin-left:auto;}

/* ── HOME: LESSON CARDS ──────────────────────────────── */
.lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:460px){.lesson-grid{grid-template-columns:1fr;}}
.lc{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:8px;padding:14px 14px 12px;
  cursor:pointer;transition:border-color .18s,background .18s;
  position:relative;overflow:hidden;
}
.lc:hover:not(.lc-locked){border-color:var(--gold-dim);background:#1e1c16;}
.lc.lc-locked{opacity:.38;cursor:not-allowed;}
.lc.lc-done{border-color:var(--green-b);}
.lc.lc-done::after{
  content:'✓';position:absolute;top:9px;right:11px;
  color:var(--green);font-family:'JetBrains Mono',monospace;font-size:11px;
}
.lc-num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-xs);margin-bottom:5px;}
.lc-score{display:inline-block;margin-top:4px;margin-left:6px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--green);border:1px solid var(--green-b);border-radius:4px;padding:1px 5px;}
.lc-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4;}
.lc-desc{font-size:11px;color:var(--text-dim);line-height:1.6;}
.lc-tag{
  display:inline-block;margin-top:8px;
  font-family:'JetBrains Mono',monospace;font-size:9px;
  padding:2px 7px;border-radius:3px;letter-spacing:1px;
}
.lc-locked .lc-num::before{content:'🔒 ';}
.lc-lock-note{font-size:10px;color:var(--text-xs);margin-top:5px;font-style:italic;}

/* tag colours */
.tag-g{background:#0a1a0e;color:var(--s1);}
.tag-c{background:var(--gold-bg);color:var(--s2);}
.tag-l{background:var(--blue-bg);color:var(--s3);}
.tag-b{background:#14081e;color:var(--s4);}

/* ── BACK BUTTON ─────────────────────────────────────── */
.back-btn{
  align-self:flex-start;background:none;border:none;
  color:var(--text-dim);font-size:12px;cursor:pointer;
  padding:8px 0;margin-bottom:2px;
  display:flex;align-items:center;gap:5px;
  font-family:'Noto Sans TC',sans-serif;
  transition:color .15s;
}
.back-btn:hover{color:var(--text);}

/* ── PROGRESS BAR ────────────────────────────────────── */
.prog-wrap{width:100%;margin-bottom:16px;}
.prog-meta{display:flex;justify-content:space-between;align-items:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);
  margin-bottom:6px;letter-spacing:.5px;}
.prog-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease;}

/* phase dots row */
.phase-dots{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.pd{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  padding:3px 9px;border-radius:20px;letter-spacing:.5px;
  border:1px solid var(--border2);color:var(--text-xs);
  transition:all .2s;
}
.pd.pd-done{border-color:var(--green-b);color:var(--green);background:var(--green-bg);}
.pd.pd-active{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-bg);}

/* ── LESSON BOX ──────────────────────────────────────── */
.lesson-box{
  background:var(--bg2);border:1px solid var(--border);
  border-left:2px solid var(--gold);border-radius:6px;
  padding:14px 16px;margin-bottom:16px;
  font-size:13px;line-height:1.85;
}
.lesson-box .lb-title{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:2px;color:var(--gold);margin-bottom:8px;text-transform:uppercase;
}
.lesson-box b{color:var(--text);}
.lesson-box code{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  background:var(--surface);padding:1px 5px;border-radius:3px;color:var(--amber);
}

/* ── Q META ROW ──────────────────────────────────────── */
.q-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.q-case{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-xs);letter-spacing:2px;}
.phase-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;letter-spacing:1px;}
.pb-demo   {background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-dim);}
.pb-guided {background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b);}
.pb-solo   {background:var(--red-bg); color:#d47070;   border:1px solid var(--red-b);}
.pb-battle {background:#14081e;       color:var(--s4); border:1px solid #3a1a4a;}
.source-tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;margin-left:auto;}
.src-real{background:#0c1a0c;color:#4a8a5a;border:1px solid #1a3a2a;}
.src-made{background:#0c100e;color:#3a6a4a;border:1px solid #162818;}

/* ── STEP INDICATOR ──────────────────────────────────── */
.step-ind{
  font-size:11px;color:var(--text-dim);
  padding:5px 11px;background:var(--surface);
  border-radius:5px;border:1px solid var(--border2);
  display:inline-block;margin-bottom:12px;
}
.step-ind b{color:var(--gold);}

/* ── SENTENCE ────────────────────────────────────────── */
.sent-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:16px 18px;margin-bottom:7px;
}
.sentence{
  font-family:'Noto Serif TC',serif;
  font-size:clamp(13px,3.2vw,16px);
  line-height:2.1;color:var(--text);
}
.blank{
  display:inline-block;min-width:68px;
  border-bottom:1.5px solid var(--gold);
  color:var(--gold);font-family:'JetBrains Mono',monospace;
  text-align:center;padding:0 4px;font-size:12px;
  transition:color .2s,border-color .2s;
}
.blank.ok{color:var(--green);border-color:var(--green);}
.blank.no{color:var(--red);border-color:var(--red);}

.ctx-hint{font-size:11px;color:var(--text-dim);margin-bottom:14px;padding-left:2px;font-style:italic;}

/* ── GUIDE QUESTION ──────────────────────────────────── */
.guide-q{font-size:13px;color:var(--text);margin-bottom:13px;line-height:1.75;font-weight:500;}

/* ── OPTIONS ─────────────────────────────────────────── */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.opts.single-col{grid-template-columns:1fr;}
@media(max-width:440px){.opts{grid-template-columns:1fr;}}

.opt{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:7px;padding:10px 13px;
  color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:12.5px;
  cursor:pointer;text-align:left;transition:border-color .15s,background .15s;
  display:flex;align-items:flex-start;gap:9px;line-height:1.55;
}
.opt:hover:not(:disabled){border-color:var(--gold-dim);background:#1e1c14;}
.opt .key{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--gold);min-width:16px;font-weight:700;margin-top:1px;flex-shrink:0;
}
.opt.ok{border-color:var(--green-b);background:var(--green-bg);color:var(--green);}
.opt.ok .key{color:var(--green);}
.opt.no{border-color:var(--red-b);background:var(--red-bg);color:#d47070;}
.opt.no .key{color:#d47070;}
.opt:disabled{cursor:default;opacity:.72;}

/* ── FEEDBACK ────────────────────────────────────────── */
.fb{padding:12px 15px;border-radius:7px;font-size:12.5px;line-height:1.75;display:none;margin-bottom:13px;}
.fb.on{display:block;}
.fb.good{background:var(--green-bg);border:1px solid var(--green-b);color:#85cf9a;}
.fb.bad {background:var(--red-bg);  border:1px solid var(--red-b);  color:#d47878;}
.fb.info{background:var(--blue-bg); border:1px solid var(--blue-b); color:#80a8e8;}
.fb-t{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;margin-bottom:5px;opacity:.75;text-transform:uppercase;}

/* unit-hint inline block */
.unit-hint{margin-top:7px;padding:6px 10px;background:var(--bg);border-radius:4px;border:1px solid var(--border);font-size:11px;color:var(--text-dim);}
.unit-hint a{color:var(--gold);cursor:pointer;text-decoration:underline;}

/* ── ACTION BUTTONS ──────────────────────────────────── */
.act-btn{
  width:100%;padding:12px;border-radius:7px;border:none;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1px;
  transition:all .18s;display:none;
}
.act-btn.on{display:block;}
.act-btn.primary{background:var(--gold);color:var(--bg);}
.act-btn.primary:hover{background:#d4ac5a;}
.act-btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);margin-top:8px;}
.act-btn.ghost:hover{border-color:var(--gold-dim);color:var(--text);}
.retry-btn{
  background:none;border:none;color:var(--text-dim);font-size:12px;
  cursor:pointer;padding:6px 0;display:none;
  font-family:'Noto Sans TC',sans-serif;text-decoration:underline;
}

/* ── COMPLETE SCREEN ─────────────────────────────────── */
.done-icon{font-size:44px;text-align:center;margin:14px 0 8px;}
.done-stars{font-size:26px;text-align:center;margin-bottom:8px;}
.done-big{font-family:'JetBrains Mono',monospace;font-size:52px;color:var(--gold);font-weight:700;line-height:1;text-align:center;}
.done-lbl{font-size:11px;color:var(--text-dim);text-align:center;margin-top:3px;letter-spacing:2px;}
.done-msg{font-size:13px;color:var(--text);line-height:1.8;padding:13px 15px;background:var(--bg2);border-radius:7px;border:1px solid var(--border);margin:14px 0;}

.wrong-review{margin-top:4px;}
.wr-item{background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--red);border-radius:6px;padding:10px 14px;margin-bottom:8px;font-size:12px;line-height:1.75;}
.wr-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--red);letter-spacing:2px;margin-bottom:4px;text-transform:uppercase;}
.wr-ans{color:var(--green);font-weight:700;}

.formula-box{background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--gold);border-radius:6px;padding:13px 15px;font-size:12.5px;line-height:1.9;margin-top:6px;}
.formula-box .fb-head{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}

.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

/* ── BATTLE / PASSAGE ────────────────────────────────── */
.passage-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:18px;margin-bottom:14px;
  font-size:13px;line-height:2.1;color:var(--text);
}
.p-blank{
  display:inline-block;min-width:52px;border-bottom:1.5px solid var(--gold);
  text-align:center;color:var(--gold);font-family:'JetBrains Mono',monospace;
  font-size:11px;padding:0 3px;cursor:default;
  transition:color .2s,border-color .2s;
}
.p-blank.ok{color:var(--green);border-color:var(--green);}
.p-blank.no{color:var(--red);border-color:var(--red);}

/* strategy steps */
.strat-steps{display:flex;flex-direction:column;gap:10px;margin:14px 0;}
.strat-step{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:7px;padding:13px 15px;
  display:flex;align-items:flex-start;gap:12px;
}
.strat-num{
  font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;
  color:var(--gold);min-width:24px;margin-top:1px;
}
.strat-body{font-size:13px;line-height:1.75;}
.strat-body .strat-title{font-weight:700;color:var(--text);margin-bottom:3px;}
.strat-body .strat-desc{color:var(--text-dim);font-size:12px;}

/* score row */
.score-row{display:flex;gap:14px;}
.sc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);}
.sc span{color:var(--gold);font-size:12px;font-weight:700;}

/* ── MISC ────────────────────────────────────────────── */
.tag-inline{display:inline-block;padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;margin-left:5px;vertical-align:middle;}
</style>
</head>
<body>

<!-- ████████████████████████████████████████
     SCREEN: HOME
████████████████████████████████████████ -->
<div id="s-home" class="screen on">
  <div class="site-hd">
    <div class="eyebrow">🔍 GSAT Cloze Detective</div>
    <h1>文義選填偵探</h1>
    <div class="sub">從詞性到實戰 · 16個學習點 · 80題訓練</div>
  </div>

  <div class="card" style="margin-bottom:18px;">
    <div class="card-top-line"></div>
    <div style="font-size:12.5px;color:var(--text-dim);line-height:1.85;margin-bottom:14px;">
      高分關鍵不是「猜感覺」，而是找線索。<br>
      每個學習點：<b style="color:var(--gold)">示範題</b> → <b style="color:var(--blue)">輔助題</b> → <b style="color:var(--red)">3題獨立作答</b>，一步步建立解題本能。
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;text-align:center;">
      <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:10px 5px;">
        <div style="font-size:18px;margin-bottom:3px;">🎓</div>
        <div style="font-size:10px;color:var(--text-dim);">示範<br>兩步引導</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:10px 5px;">
        <div style="font-size:18px;margin-bottom:3px;">🔎</div>
        <div style="font-size:10px;color:var(--text-dim);">輔助<br>中文提示</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:10px 5px;">
        <div style="font-size:18px;margin-bottom:3px;">🕵️</div>
        <div style="font-size:10px;color:var(--text-dim);">獨立<br>純英文</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:10px 5px;">
        <div style="font-size:18px;margin-bottom:3px;">⚔️</div>
        <div style="font-size:10px;color:var(--text-dim);">實戰<br>歷屆真題</div>
      </div>
    </div>
  </div>

  <div id="home-stages" style="width:100%;"></div>
</div>

<!-- ████████████████████████████████████████
     SCREEN: PRACTICE
████████████████████████████████████████ -->
<div id="s-practice" class="screen">
  <button class="back-btn" onclick="goHome()">← 返回</button>
  <div class="site-hd" style="padding-top:6px;">
    <div class="eyebrow" id="prac-eyebrow">1-1</div>
    <h1 id="prac-title">學習點標題</h1>
  </div>

  <div class="prog-wrap">
    <div class="prog-meta">
      <span id="prac-prog-lbl">題目 1 / 5</span>
      <div class="score-row">
        <div class="sc">答對 <span id="prac-c">0</span></div>
        <div class="sc">答錯 <span id="prac-w">0</span></div>
      </div>
    </div>
    <div class="prog-bar">
      <div class="prog-fill" id="prac-prog-fill" style="width:0%;background:var(--gold);"></div>
    </div>
  </div>
  <div class="phase-dots" id="prac-phase-dots"></div>

  <div class="card" id="prac-card">
    <div class="card-top-line"></div>
    <div class="q-meta-row">
      <span class="q-case" id="prac-case">CASE 01</span>
      <span class="phase-badge pb-demo" id="prac-phase-badge">示範題</span>
      <span class="source-tag src-made" id="prac-source-tag">自製</span>
    </div>

    <div class="lesson-box" id="prac-lesson" style="display:none;">
      <div class="lb-title" id="prac-lesson-title">提示</div>
      <div id="prac-lesson-body"></div>
    </div>

    <div class="step-ind" id="prac-step-ind" style="display:none;">
      <b>步驟一</b>：找線索 → <b>步驟二</b>：選答案
    </div>

    <div class="sent-wrap">
      <div class="sentence" id="prac-sentence"></div>
    </div>
    <div class="ctx-hint" id="prac-ctx"></div>

    <div class="guide-q" id="prac-gq"></div>
    <div class="opts" id="prac-opts"></div>

    <div class="fb" id="prac-fb">
      <div class="fb-t" id="prac-fb-t"></div>
      <div id="prac-fb-body"></div>
      <button class="act-btn primary" id="prac-next" onclick="pracNext()" style="display:none;margin-top:12px;"></button>
    </div>

    <button class="retry-btn" id="prac-retry" onclick="pracRetry()">↩ 再看一次</button>
  </div>
</div>

<!-- ████████████████████████████████████████
     SCREEN: UNIT DONE
████████████████████████████████████████ -->
<div id="s-done" class="screen">
  <div class="site-hd">
    <div class="eyebrow" id="done-eyebrow">完成</div>
    <h1>偵探任務完成</h1>
  </div>
  <div class="card">
    <div class="card-top-line"></div>
    <div class="done-icon" id="done-icon">🕵️</div>
    <div class="done-stars" id="done-stars"></div>
    <div class="done-big" id="done-big"></div>
    <div class="done-lbl">本學習點成績</div>
    <div class="done-msg" id="done-msg"></div>
    <div class="wrong-review" id="done-wrong"></div>
    <div class="divider"></div>
    <div class="formula-box">
      <div class="fb-head">本學習點核心技巧</div>
      <div id="done-formula"></div>
    </div>
    <br>
    <button class="act-btn primary on" onclick="goHome()">← 返回地圖</button>
    <button class="act-btn ghost on" onclick="replayLesson()">🔄 再練一次</button>
  </div>
</div>

<!-- ████████████████████████████████████████
     SCREEN: BATTLE (Unit 4-strategy + full passage)
████████████████████████████████████████ -->
<div id="s-battle" class="screen">
  <button class="back-btn" onclick="goHome()">← 返回</button>
  <div class="site-hd" style="padding-top:6px;">
    <div class="eyebrow" id="battle-eyebrow">STAGE 4</div>
    <h1 id="battle-title">實戰模式</h1>
    <div class="sub" id="battle-sub"></div>
  </div>
  <div id="battle-area" style="width:100%;"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  LESSON METADATA
// ═══════════════════════════════════════════════════════
const LESSONS = [
  // STAGE 1 — 詞性
  { id:'1-1', stage:1, title:'名詞判定：冠詞、形容詞後',    desc:'a/an/the、形容詞之後 → 名詞',   tag:'g', unlock:null },
  { id:'1-2', stage:1, title:'動詞原形：助動詞、to 後',      desc:'can/should/to 之後 → 動詞原形', tag:'g', unlock:'1-1' },
  { id:'1-3', stage:1, title:'形容詞：連綴動詞、感官動詞後',   desc:'be/feel/look/seem → 形容詞',    tag:'g', unlock:'1-2' },
  { id:'1-4', stage:1, title:'副詞：修飾動詞或 V-ed',        desc:'be + ___ + V-ed → 副詞(-ly)',  tag:'g', unlock:'1-3' },
  // STAGE 2 — 搭配 + 介系詞
  { id:'2-1', stage:2, title:'形容詞 + for 介系詞',           desc:'be responsible/noted for…',      tag:'c', unlock:'1-4' },
  { id:'2-2', stage:2, title:'動詞/分詞 + with 介系詞',       desc:'associated with, comes with…',   tag:'c', unlock:'2-1' },
  { id:'2-3', stage:2, title:'三字片語完整性',                desc:'regardless of, instead of…',     tag:'c', unlock:'2-2' },
  { id:'2-4', stage:2, title:'名詞 + 介系詞固定結合',         desc:'risk of, solution to, cause of…',tag:'c', unlock:'2-3' },
  // STAGE 3 — 邏輯
  { id:'3-1', stage:3, title:'因果連結詞',                    desc:'Consequently, As a result…',     tag:'l', unlock:'2-4' },
  { id:'3-2', stage:3, title:'對比與轉折連結詞',              desc:'However, Nevertheless, Instead…', tag:'l', unlock:'3-1' },
  { id:'3-3', stage:3, title:'遞進與補充關係',                desc:'Furthermore, Similarly, As well…',tag:'l', unlock:'3-2' },
  { id:'3-4', stage:3, title:'同義／反義上下文暗示',          desc:'上文 slow → 下文考 fast…',       tag:'l', unlock:'3-3' },
  // STAGE 4 — 實戰
  { id:'4-1', stage:4, title:'策略教學：四輪解題法',          desc:'秒殺→詞性→朗讀→消去',            tag:'b', unlock:'3-4' },
  { id:'4-2', stage:4, title:'整段實戰 A（98年）',            desc:'The Tortoise and the Hare',       tag:'b', unlock:'4-1' },
  { id:'4-3', stage:4, title:'整段實戰 B（108年）',           desc:'父親的記憶問題',                  tag:'b', unlock:'4-2' },
  { id:'4-4', stage:4, title:'整段實戰 C（112年）',           desc:'喝水與補水的科學',                tag:'b', unlock:'4-3' },
];

const STAGE_META = {
  1: { label:'Stage 1 — 詞性定位', color:'var(--s1)' },
  2: { label:'Stage 2 — 搭配詞與介系詞', color:'var(--s2)' },
  3: { label:'Stage 3 — 句間邏輯', color:'var(--s3)' },
  4: { label:'Stage 4 — 實戰策略', color:'var(--s4)' },
};

// ═══════════════════════════════════════════════════════
//  localStorage PROGRESS
// ═══════════════════════════════════════════════════════
function getProgress() {
  try { return JSON.parse(localStorage.getItem('cloze_v3_progress') || '{}'); }
  catch(e) { return {}; }
}
function setDone(lessonId, correct, total) {
  const p = getProgress(); p[lessonId] = true;
  if (correct !== undefined && total !== undefined) {
    const key = 'cloze_v3_score';
    const scores = JSON.parse(localStorage.getItem(key) || '{}');
    const prev = scores[lessonId];
    if (!prev || correct > prev.c) scores[lessonId] = {c: correct, t: total};
    localStorage.setItem(key, JSON.stringify(scores));
  }
  localStorage.setItem('cloze_v3_progress', JSON.stringify(p));
}
function getBestScore(lessonId) {
  const scores = JSON.parse(localStorage.getItem('cloze_v3_score') || '{}');
  return scores[lessonId] || null;
}
function isDone(lessonId) { return !!getProgress()[lessonId]; }
function isUnlocked(lesson) {
  if (!lesson.unlock) return true;
  return isDone(lesson.unlock);
}

// ═══════════════════════════════════════════════════════
//  HOME SCREEN
// ═══════════════════════════════════════════════════════
function buildHome() {
  const container = document.getElementById('home-stages');
  container.innerHTML = '';

  [1,2,3,4].forEach(s => {
    const meta = STAGE_META[s];
    const lessons = LESSONS.filter(l => l.stage === s);
    const doneCount = lessons.filter(l => isDone(l.id)).length;

    const sec = document.createElement('div');
    sec.className = 'stage-section';
    sec.innerHTML = `
      <div class="stage-header">
        <div class="stage-dot" style="background:${meta.color};"></div>
        <div class="stage-title">${meta.label}</div>
        <div class="stage-progress">${doneCount}/${lessons.length}</div>
      </div>
      <div class="lesson-grid" id="sg-${s}"></div>
    `;
    container.appendChild(sec);

    const grid = sec.querySelector(`#sg-${s}`);
    lessons.forEach(l => {
      const locked = !isUnlocked(l);
      const done = isDone(l.id);
      const tagClass = { g:'tag-g', c:'tag-c', l:'tag-l', b:'tag-b' }[l.tag];
      const tagLabel = { g:'詞性', c:'搭配', l:'邏輯', b:'實戰' }[l.tag];

      const card = document.createElement('div');
      card.className = 'lc' + (locked ? ' lc-locked' : '') + (done ? ' lc-done' : '');
      const sc = done ? getBestScore(l.id) : null;
      const scoreTag = sc ? `<span class="lc-score">${sc.c}/${sc.t}</span>` : '';
      card.innerHTML = `
        <div class="lc-num">${l.id}</div>
        <div class="lc-title">${l.title}</div>
        <div class="lc-desc">${l.desc}</div>
        <span class="lc-tag ${tagClass}">${tagLabel}</span>${scoreTag}
        ${locked ? `<div class="lc-lock-note">完成 ${l.unlock} 後解鎖</div>` : ''}
      `;
      if (!locked) card.onclick = () => startLesson(l.id);
      grid.appendChild(card);
    });
  });
}

function goHome() {
  showScreen('s-home');
  buildHome();
}

// ═══════════════════════════════════════════════════════
//  PRACTICE ENGINE
// ═══════════════════════════════════════════════════════
let cur = { lessonId:null, qIdx:0, correct:0, wrong:0, wrongList:[], mode:null };
// mode: 'clue' | 'main' | 'guide' | 'retry-main'

function startLesson(id) {
  // Special handling for stage 4
  if (id === '4-1') { startStrategy(); return; }
  if (id === '4-2') { startPassage(BATTLE_PASSAGE_98); return; }
  if (id === '4-3') { startPassage(BATTLE_PASSAGE_108); return; }
  if (id === '4-4') { startPassage(BATTLE_PASSAGE_112); return; }

  const lesson = LESSONS.find(l => l.id === id);
  const qs = QUESTION_DATA[id];
  if (!qs) { alert('題目資料尚未載入'); return; }

  cur = { lessonId:id, qIdx:0, correct:0, wrong:0, wrongList:[] };

  document.getElementById('prac-eyebrow').textContent = id;
  document.getElementById('prac-title').textContent = lesson.title;

  // Build phase dots (5 questions)
  const phaseLabels = ['示範','輔助','獨立①','獨立②','獨立③'];
  const dotsEl = document.getElementById('prac-phase-dots');
  dotsEl.innerHTML = phaseLabels.map((p,i) => `<span class="pd" id="pd-${i}">${p}</span>`).join('');

  showScreen('s-practice');
  renderQ();
}

function renderQ() {
  const qs = QUESTION_DATA[cur.lessonId];
  const q = qs[cur.qIdx];
  const total = qs.length;

  // progress
  document.getElementById('prac-prog-lbl').textContent = `題目 ${cur.qIdx+1} / ${total}`;
  document.getElementById('prac-c').textContent = cur.correct;
  document.getElementById('prac-w').textContent = cur.wrong;
  const stageColor = { demo:'var(--gold)', guided:'var(--blue)', solo:'var(--red)' };
  document.getElementById('prac-prog-fill').style.background = stageColor[q.phase] || 'var(--gold)';
  document.getElementById('prac-prog-fill').style.width = `${cur.qIdx/total*100}%`;

  // phase dots
  ['示範','輔助','獨立①','獨立②','獨立③'].forEach((_,i) => {
    const dot = document.getElementById('pd-'+i);
    if (!dot) return;
    dot.className = 'pd' + (i < cur.qIdx ? ' pd-done' : i === cur.qIdx ? ' pd-active' : '');
  });

  // phase badge
  const phaseLabel = { demo:'示範題', guided:'輔助題', solo:'獨立題' }[q.phase];
  const phaseClass = { demo:'pb-demo', guided:'pb-guided', solo:'pb-solo' }[q.phase];
  const pb = document.getElementById('prac-phase-badge');
  pb.textContent = phaseLabel; pb.className = 'phase-badge ' + phaseClass;

  // source tag
  const st = document.getElementById('prac-source-tag');
  st.textContent = q.source === 'real' ? '真題' : '自製';
  st.className = 'source-tag ' + (q.source === 'real' ? 'src-real' : 'src-made');

  document.getElementById('prac-case').textContent = `CASE ${String(cur.qIdx+1).padStart(2,'0')}`;

  // lesson box (show on first q of this lesson, or if q has lesson)
  const lb = document.getElementById('prac-lesson');
  if (q.lesson) {
    lb.style.display = 'block';
    document.getElementById('prac-lesson-title').textContent = q.lesson.title;
    document.getElementById('prac-lesson-body').innerHTML = q.lesson.body;
  } else { lb.style.display = 'none'; }

  // step indicator
  document.getElementById('prac-step-ind').style.display = q.phase === 'demo' ? 'inline-block' : 'none';
  document.getElementById('prac-step-ind').innerHTML = '<b>步驟一</b>：找線索 → <b>步驟二</b>：選答案';

  // sentence
  const sentHTML = q.sentence.replace('___', `<span class="blank" id="the-blank">______</span>`);
  document.getElementById('prac-sentence').innerHTML = sentHTML;

  // ctx hint (hide for solo)
  const ctx = document.getElementById('prac-ctx');
  ctx.textContent = (q.phase !== 'solo' && q.ctx) ? q.ctx : '';

  // reset
  cur.mode = q.phase === 'demo' ? 'clue' : 'main';
  document.getElementById('prac-fb').className = 'fb';
  document.getElementById('prac-next').style.display = 'none';
  document.getElementById('prac-retry').style.display = 'none';

  if (q.phase === 'demo') {
    document.getElementById('prac-gq').innerHTML = q.clueQ;
    renderOpts(q.clueOpts);
  } else {
    document.getElementById('prac-gq').innerHTML = q.mainQ;
    renderOpts(q.mainOpts);
  }
}

function renderOpts(opts) {
  const wrap = document.getElementById('prac-opts');
  wrap.innerHTML = '';
  const longText = opts.some(o => o.t.length > 20);
  wrap.className = 'opts' + (longText ? ' single-col' : '');
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="key">${o.k}</span><span>${o.t}</span>`;
    btn.onclick = () => handleOpt(o.k);
    wrap.appendChild(btn);
  });
}

function handleOpt(chosen) {
  const q = QUESTION_DATA[cur.lessonId][cur.qIdx];
  disableOpts();

  if (cur.mode === 'clue') {
    // ── Demo 步驟一：找線索 ──
    if (chosen === q.clueKey) {
      markOpt(chosen, true);
      // 切換到步驟二：收起教學框，更新提示
      cur.mode = 'main';
      // 收起 lesson box 節省空間
      document.getElementById('prac-lesson').style.display = 'none';
      showFB('info', '🕵️ 線索找到了！', q.clueExplain + '<br><br><span style="color:var(--gold);font-size:12px;">▼ 現在請選出正確答案：</span>');
      document.getElementById('prac-step-ind').innerHTML = '→ <b>步驟二</b>：現在選答案';
      document.getElementById('prac-gq').innerHTML = q.mainQ;
      renderOpts(q.mainOpts);
    } else {
      markOpt(chosen, false);
      showFB('bad', '再仔細看句子', '線索選錯了，再找找看空格前後有什麼字。');
      const rb = document.getElementById('prac-retry');
      rb.style.display = 'block';
      rb.onclick = () => { rb.style.display = 'none'; hideFB(); renderOpts(q.clueOpts); };
    }

  } else if (cur.mode === 'main') {
    // ── 主答題 ──
    if (chosen === q.ans) {
      markOpt(chosen, true);
      highlightBlank(true, q.ansWord);
      cur.correct++;
      document.getElementById('prac-c').textContent = cur.correct;
      // 加年度標示（如果 explain 裡沒有已有的話）
      const yearTag = (q.year && !q.explain.includes(q.year))
        ? `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-xs);margin-left:6px;">(${q.year})</span>` : '';
      showFB('good', '🕵️ 正確！', q.explain + yearTag);
      showNext(cur.qIdx < QUESTION_DATA[cur.lessonId].length - 1 ? '下一題 →' : '查看成績', pracNext);
    } else {
      markOpt(chosen, false);
      highlightBlank(false);
      cur.wrong++;
      document.getElementById('prac-w').textContent = cur.wrong;
      // 立即顯示引導，不用 setTimeout
      cur.mode = 'guide';
      showFB('bad', '🕵️ 再想想', '答案不對。看一個引導線索：');
      document.getElementById('prac-gq').innerHTML = q.guide.q;
      renderOpts(q.guide.opts);
    }

  } else if (cur.mode === 'guide') {
    // ── 引導題 ──
    if (chosen === q.guide.key) {
      markOpt(chosen, true);
      cur.mode = 'retry-main';
      showFB('info', '🕵️ 找到了！', q.guide.explain + '<br><br><span style="color:var(--gold);font-size:12px;">▼ 再選一次正確答案：</span>');
      document.getElementById('prac-gq').innerHTML = q.mainQ;
      renderOpts(q.mainOpts);
      const bl = document.getElementById('the-blank');
      if (bl) { bl.className = 'blank'; bl.textContent = '______'; }
    } else {
      markOpt(chosen, false);
      showFB('bad', '線索找錯了', '再觀察一下。');
      const rb = document.getElementById('prac-retry');
      rb.style.display = 'block';
      rb.onclick = () => { rb.style.display = 'none'; hideFB(); renderOpts(q.guide.opts); };
    }

  } else if (cur.mode === 'retry-main') {
    // ── 第二次作答 ──
    const yearTag = (q.year && !q.explain.includes(q.year))
      ? `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-xs);margin-left:6px;">(${q.year})</span>` : '';
    if (chosen === q.ans) {
      markOpt(chosen, true);
      highlightBlank(true, q.ansWord);
      showFB('good', '🕵️ 正確！', q.explain + yearTag);
    } else {
      markOpt(chosen, false);
      cur.wrongList.push(q);
      highlightBlank(true, q.ansWord);
      showFB('info', '正確答案', `答案是 <b>${q.ans}. ${q.ansWord}</b>。<br>${q.explain}` + yearTag);
    }
    showNext(cur.qIdx < QUESTION_DATA[cur.lessonId].length - 1 ? '下一題 →' : '查看成績', pracNext);
  }
}

function pracNext() {
  const q = QUESTION_DATA[cur.lessonId][cur.qIdx];
  const bl = document.getElementById('the-blank');
  if (bl && bl.classList.contains('no')) cur.wrongList.push(q);
  cur.qIdx++;
  if (cur.qIdx >= QUESTION_DATA[cur.lessonId].length) {
    showDone();
  } else {
    renderQ();
    window.scrollTo({ top:0, behavior:'smooth' });
  }
}

function pracRetry() {} // handled inline

function replayLesson() { startLesson(cur.lessonId); }

function showDone() {
  setDone(cur.lessonId, cur.correct, cur.correct + cur.wrong);
  const lesson = LESSONS.find(l => l.id === cur.lessonId);
  const total = QUESTION_DATA[cur.lessonId].length;
  const pct = cur.correct / total;

  document.getElementById('done-eyebrow').textContent = cur.lessonId + ' 完成';
  document.getElementById('done-big').textContent = `${cur.correct}/${total}`;
  document.getElementById('done-stars').textContent = pct >= .9 ? '⭐⭐⭐' : pct >= .7 ? '⭐⭐' : '⭐';
  document.getElementById('done-icon').textContent = pct >= .7 ? '🕵️' : '📖';
  document.getElementById('done-msg').textContent = pct >= .9 ? '🏆 完美！這個技巧已經內化了。'
    : pct >= .7 ? '🕵️ 很好！再多練幾次，這個技巧就會變成本能。'
    : '💪 這個學習點需要多複習，建議再做一次。';

  const uniqueWrong = [...new Map((cur.wrongList).map(q => [q.sentence, q])).values()];
  const wr = document.getElementById('done-wrong');
  if (uniqueWrong.length > 0) {
    wr.innerHTML = '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--text-xs);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;">需要複習</div>'
      + uniqueWrong.map((q,i) => `<div class="wr-item">
          <div class="wr-lbl">複習 ${i+1}</div>
          <div>${q.sentence.replace('___', `<b style="color:var(--green)">${q.ansWord}</b>`)}</div>
          <div style="margin-top:3px;font-size:11px;color:var(--text-dim);">✓ <span class="wr-ans">${q.ansWord}</span></div>
        </div>`).join('');
  } else { wr.innerHTML = ''; }

  document.getElementById('done-formula').innerHTML = FORMULAS[cur.lessonId] || '';
  showScreen('s-done');
}

// ── helpers ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo({ top:0, behavior:'smooth' });
}
function disableOpts() { document.querySelectorAll('#prac-opts .opt').forEach(b => b.disabled = true); }
function markOpt(key, ok) {
  document.querySelectorAll('#prac-opts .opt').forEach(btn => {
    if (btn.querySelector('.key').textContent === key) btn.classList.add(ok ? 'ok' : 'no');
  });
}
function highlightBlank(ok, word) {
  const bl = document.getElementById('the-blank');
  if (!bl) return;
  bl.className = 'blank ' + (ok ? 'ok' : 'no');
  if (ok) bl.textContent = word;
}
function showFB(type, title, body) {
  const fb = document.getElementById('prac-fb');
  fb.className = 'fb ' + type + ' on';
  document.getElementById('prac-fb-t').textContent = title;
  document.getElementById('prac-fb-body').innerHTML = body;
}
function hideFB() { document.getElementById('prac-fb').className = 'fb'; }
function showNext(label, fn) {
  const nb = document.getElementById('prac-next');
  nb.textContent = label;
  nb.style.display = 'block';
  nb.onclick = fn;
}

// ═══════════════════════════════════════════════════════
//  FORMULAS (shown at end of each lesson)
// ═══════════════════════════════════════════════════════
const FORMULAS = {
  '1-1': '<b>a / an / the</b> + ___ → <b>名詞</b><br><b>形容詞</b> + ___ → <b>名詞</b><br>例：a <u>common</u> <b>device</b>、this <u>beautiful</u> <b>ring</b>',
  '1-2': '<b>can / should / will / to</b> + ___ → <b>動詞原形</b><br>例：to <b>study</b>、may <b>delay</b>、should <b>remain</b>',
  '1-3': '<b>be / feel / look / seem / become / taste / smell / sound</b> + ___ → <b>形容詞</b><br>例：feels <b>confident</b>、seemed <b>risky</b>',
  '1-4': '<b>be + ___ + V-ed</b> → 副詞（通常 -ly 結尾）<br>例：was <b>securely</b> fixed、is <b>widely</b> used',
  '2-1': '<b>be + ___ + for</b> → 記形容詞：<b>responsible</b> for、<b>noted</b> for、<b>known</b> for、<b>famous</b> for、<b>sorry</b> for',
  '2-2': '<b>___ + with</b> → 記動詞/分詞：<b>associated</b> with、<b>comes</b> with、<b>charged</b> with、<b>filled</b> with',
  '2-3': '三字片語整組要記：<b>regardless of</b>、<b>instead of</b>、<b>in spite of</b>、<b>as well as</b>、<b>due to</b>',
  '2-4': '名詞 + 固定介系詞：<b>risk of</b>、<b>solution to</b>、<b>cause of</b>、<b>result in</b>、<b>contribute to</b>',
  '3-1': '因果詞：<b>Consequently / As a result / Therefore / Thus</b> → 前因後果，方向一致',
  '3-2': '轉折詞：<b>However / Nevertheless / Instead / Although / Despite</b> → 前後相反，找對比詞',
  '3-3': '遞進詞：<b>Furthermore / Moreover / Similarly / In addition</b> → 前後補充，方向相同',

//  BATTLE PASSAGE ENGINE
// ═══════════════════════════════════════════════════════
let bp_cur = { passage:null, qIdx:0, correct:0, wrong:0, wrongList:[] };

function startPassage(passageData) {
  bp_cur = { passage:passageData, qIdx:0, correct:0, wrong:0, wrongList:[] };
  document.getElementById('battle-eyebrow').textContent = passageData.lessonId;
  document.getElementById('battle-title').textContent = passageData.title;
  document.getElementById('battle-sub').textContent = passageData.year + ' · 完整文義選填';
  showScreen('s-battle');
  renderPassage();
}

function renderPassage() {
  const p = bp_cur.passage;
  const area = document.getElementById('battle-area');

  // Build passage HTML, replacing [N] with clickable blank spans
  let passHTML = p.text;
  p.blanks.forEach(b => {
    passHTML = passHTML.replace(`[${b.num}]`, `<span class="p-blank" id="pb${b.num}">(${b.num})</span>`);
  });

  area.innerHTML = `
    <div class="card">
      <div class="card-top-line"></div>
      <div class="lesson-box">
        <div class="lb-title">📖 閱讀整段文章，再逐題作答</div>
        ${p.intro}
      </div>
      <div class="passage-box">${passHTML}</div>
      <div id="bp-q-area"></div>
    </div>
  `;
  renderBPQuestion();
}

function renderBPQuestion() {
  const p = bp_cur.passage;
  const b = p.blanks[bp_cur.qIdx];
  const area = document.getElementById('bp-q-area');

  area.innerHTML = `
    <div class="divider"></div>
    <div class="prog-wrap">
      <div class="prog-meta">
        <span>空格 (${b.num}) — ${bp_cur.qIdx+1}/${p.blanks.length}</span>
        <div class="score-row">
          <div class="sc">答對 <span>${bp_cur.correct}</span></div>
          <div class="sc">答錯 <span>${bp_cur.wrong}</span></div>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="bp-pf" style="width:${bp_cur.qIdx/p.blanks.length*100}%;background:var(--s4);"></div></div>
    </div>
    <div class="q-meta-row">
      <span class="q-case">空格 (${b.num})</span>
      <span class="phase-badge pb-battle">實戰</span>
    </div>
    <div class="guide-q">請從選項中選出最適合 (${b.num}) 的答案：</div>
    <div class="opts" id="bp-opts"></div>
    <div class="fb" id="bp-fb"><div class="fb-t" id="bp-fb-t"></div><div id="bp-fb-body"></div></div>
    <button class="act-btn primary" id="bp-next" style="display:none;" onclick="bpNext()">
      ${bp_cur.qIdx < p.blanks.length-1 ? '下一個空格 →' : '查看成績'}
    </button>
  `;

  const wrap = document.getElementById('bp-opts');
  // Show 5-6 options for this blank
  b.opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="key">${o.k}</span><span>${o.t}</span>`;
    btn.onclick = () => handleBP(o.k);
    wrap.appendChild(btn);
  });
}

function handleBP(chosen) {
  const b = bp_cur.passage.blanks[bp_cur.qIdx];
  document.querySelectorAll('#bp-opts .opt').forEach(btn => btn.disabled = true);

  const pb = document.getElementById('pb'+b.num);
  const fb = document.getElementById('bp-fb');

  document.querySelectorAll('#bp-opts .opt').forEach(btn => {
    const k = btn.querySelector('.key').textContent;
    if (k === chosen) btn.classList.add(chosen === b.ans ? 'ok' : 'no');
    if (k === b.ans) btn.classList.add('ok');
  });

  if (chosen === b.ans) {
    pb.className = 'p-blank ok'; pb.textContent = b.ansWord;
    bp_cur.correct++;
    fb.className = 'fb good on';
    document.getElementById('bp-fb-t').textContent = `🕵️ (${b.num}) 正確！`;
    document.getElementById('bp-fb-body').innerHTML = b.explain;
  } else {
    pb.className = 'p-blank no'; pb.textContent = b.ansWord;
    bp_cur.wrong++; bp_cur.wrongList.push(b);
    fb.className = 'fb bad on';
    document.getElementById('bp-fb-t').textContent = `🕵️ (${b.num}) 答錯了`;
    document.getElementById('bp-fb-body').innerHTML = `正確答案是 <b>${b.ans}. ${b.ansWord}</b>。<br>${b.explain}`;
  }
  document.getElementById('bp-next').style.display = 'block';
}

function bpNext() {
  bp_cur.qIdx++;
  if (bp_cur.qIdx >= bp_cur.passage.blanks.length) {
    showBPResult();
  } else {
    renderBPQuestion();
    window.scrollTo({ top:200, behavior:'smooth' });
  }
}

function showBPResult() {
  setDone(bp_cur.passage.lessonId, bp_cur.correct, bp_cur.correct + bp_cur.wrong);
  const total = bp_cur.passage.blanks.length;
  const pct = bp_cur.correct / total;
  const area = document.getElementById('battle-area');

  const wrongHTML = bp_cur.wrongList.length > 0
    ? '<div class="divider"></div><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--text-xs);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;">需要複習的空格</div>'
      + bp_cur.wrongList.map(b =>
          `<div class="wr-item"><div class="wr-lbl">空格 (${b.num})</div><div style="font-size:11px;color:var(--text-dim);">${b.explain}</div></div>`
        ).join('') : '';

  area.innerHTML = `
    <div class="card">
      <div class="card-top-line"></div>
      <div class="done-big">${bp_cur.correct}/${total}</div>
      <div class="done-lbl">${bp_cur.passage.year} 成績</div>
      <div class="done-msg">${pct>=.85 ? '🏆 優秀！你已經能獨立完成學測整段題了！'
        : pct>=.6 ? '🕵️ 不錯！針對答錯的空格，思考是哪個線索沒抓到。'
        : '📖 繼續練習！每次看解析都問自己：這屬於哪個學習點？'}</div>
      ${wrongHTML}
      <div class="divider"></div>
      <div class="formula-box">
        <div class="fb-head">📌 四輪解題法複習</div>
        <div style="font-size:12px;line-height:1.9;color:var(--text);">
          ① <b style="color:var(--gold)">秒殺</b>：固定搭配、介系詞片語直接填<br>
          ② <b style="color:var(--gold)">詞性</b>：to/be/a → 判斷詞性<br>
          ③ <b style="color:var(--gold)">邏輯</b>：however/therefore → 找方向<br>
          ④ <b style="color:var(--gold)">消去</b>：代入朗讀，選最順的
        </div>
      </div>
      <br>
      <button class="act-btn primary on" onclick="goHome()">← 返回地圖</button>
      <button class="act-btn ghost on" onclick="startPassage(bp_cur.passage)">🔄 再練一次</button>
    </div>
  `;
}

buildHome();
</script>
